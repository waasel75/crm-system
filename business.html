<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>CRM SYSTEM — Espace Multi-Agences</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#06060a;--card:#101018;--border:rgba(255,255,255,.08);--txt:#f4f4f5;--muted:#9a9aa8;
      --red2:#ff4d42;--violet:#7c5cff;--cyan:#22d3ee;--green:#34d399;
      --grad:linear-gradient(120deg,#ff4d42,#ff8a3d 55%,#ffd166);--grad2:linear-gradient(120deg,#7c5cff,#22d3ee)}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--txt);line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh}
    .aurora{position:fixed;width:55vw;height:55vw;border-radius:50%;filter:blur(120px);opacity:.35;z-index:0;pointer-events:none}
    .aurora.a1{background:radial-gradient(circle,#ff4d42,transparent 60%);top:-15vw;left:-12vw}
    .aurora.a2{background:radial-gradient(circle,#7c5cff,transparent 60%);bottom:-18vw;right:-10vw}
    .wrap{max-width:1100px;margin:0 auto;padding:0 22px;position:relative;z-index:2}
    .btn{display:inline-flex;align-items:center;gap:8px;border:none;border-radius:11px;padding:11px 18px;font-family:inherit;font-weight:700;font-size:.9rem;cursor:pointer;transition:.2s}
    .btn-primary{background:var(--grad);color:#1a0a06;box-shadow:0 8px 26px -8px rgba(255,77,66,.6)}
    .btn-primary:hover{transform:translateY(-2px)}
    .btn-ghost{background:rgba(255,255,255,.05);color:var(--txt);border:1px solid var(--border)}
    .btn-ghost:hover{border-color:var(--red2);color:var(--red2)}
    .btn-sm{padding:7px 12px;font-size:.8rem;border-radius:9px}

    header.top{position:sticky;top:0;z-index:30;backdrop-filter:blur(16px);background:rgba(6,6,10,.7);border-bottom:1px solid var(--border)}
    .top-in{display:flex;align-items:center;justify-content:space-between;height:66px}
    .logo{font-family:'Space Grotesk';font-weight:700;font-size:1.2rem;display:flex;align-items:center;gap:8px}
    .logo b{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
    .who{display:flex;align-items:center;gap:12px;font-size:.85rem;color:var(--muted)}

    .tabs{display:flex;gap:8px;margin:28px 0 24px}
    .tab{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--muted);font-family:inherit;font-weight:700;font-size:.88rem;padding:10px 18px;border-radius:11px;cursor:pointer;transition:.2s}
    .tab.active{background:var(--grad2);color:#06060a;border-color:transparent}

    .eyebrow{font-size:.78rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;background:var(--grad2);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:6px}
    h2.sec{font-family:'Space Grotesk';font-size:1.6rem;font-weight:700;letter-spacing:-.5px;margin-bottom:20px}

    .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:30px}
    .kpi{background:linear-gradient(160deg,rgba(255,255,255,.05),rgba(255,255,255,.01));border:1px solid var(--border);border-radius:16px;padding:22px}
    .kpi .ic{font-size:1.5rem;margin-bottom:10px}
    .kpi .v{font-family:'Space Grotesk';font-size:2rem;font-weight:700;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1}
    .kpi .l{color:var(--muted);font-size:.82rem;margin-top:6px}

    .panel{background:linear-gradient(160deg,rgba(255,255,255,.04),rgba(255,255,255,.01));border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:24px}
    table{width:100%;border-collapse:collapse}
    th,td{text-align:left;padding:12px 10px;font-size:.88rem;border-bottom:1px solid var(--border)}
    th{color:var(--muted);font-size:.74rem;text-transform:uppercase;letter-spacing:.5px;font-weight:700}
    td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
    tr:last-child td{border-bottom:none}

    .ag-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px}
    .ag-card{background:linear-gradient(160deg,rgba(255,255,255,.05),rgba(255,255,255,.01));border:1px solid var(--border);border-radius:16px;padding:22px;transition:.25s;position:relative;overflow:hidden}
    .ag-card:hover{transform:translateY(-4px);border-color:rgba(124,92,255,.4)}
    .ag-card h3{font-family:'Space Grotesk';font-size:1.2rem;margin-bottom:4px}
    .ag-card .meta{color:var(--muted);font-size:.76rem;margin-bottom:16px}
    .ag-mini{display:flex;gap:16px;margin-bottom:18px}
    .ag-mini div{font-size:.78rem;color:var(--muted)}
    .ag-mini b{display:block;font-family:'Space Grotesk';font-size:1.2rem;color:var(--txt)}
    .ag-actions{display:flex;gap:8px;flex-wrap:wrap}
    .ic-btn{background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--muted);width:34px;height:34px;border-radius:9px;cursor:pointer;font-size:.9rem}
    .ic-btn:hover{color:var(--txt);border-color:var(--red2)}
    .add-card{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;border:1.5px dashed var(--border);background:transparent;color:var(--muted);cursor:pointer;min-height:180px;font-weight:700}
    .add-card:hover{border-color:var(--red2);color:var(--red2)}
    .add-card .plus{font-size:2.2rem}
    .empty{text-align:center;color:var(--muted);padding:50px 0}
    .hidden{display:none!important}
    .loader{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:50;color:var(--muted)}
  </style>
</head>
<body>
<div class="aurora a1"></div><div class="aurora a2"></div>
<div class="loader" id="loader" data-pt="biz-loading">Chargement de votre espace…</div>

<header class="top">
  <div class="wrap top-in">
    <div class="logo">🏢 <b>CRM</b>&nbsp;<span data-pt="biz-multi">Multi-Agences</span></div>
    <div class="who">
      <select id="topLangSel" onchange="setBizLang(this.value)" title="Langue" style="background:rgba(255,255,255,.06);color:inherit;border:1px solid var(--border);border-radius:8px;padding:6px 8px;font-size:.82rem;font-weight:700;cursor:pointer">
        <option value="fr">🇫🇷 FR</option><option value="ar">🇲🇦 AR</option><option value="en">🇬🇧 EN</option><option value="es">🇪🇸 ES</option>
      </select>
      <span id="who"></span><button class="btn btn-ghost btn-sm" onclick="logout()" data-pt="biz-logout">🚪 Déconnexion</button>
    </div>
  </div>
</header>

<main class="wrap" id="main" style="display:none;padding-top:6px">
  <div class="tabs">
    <button class="tab active" id="tabBtnGlobal" onclick="showView('global')" data-pt="biz-global">🌐 Vue globale</button>
    <button class="tab" id="tabBtnAgencies" onclick="showView('agencies')" data-pt="biz-agencies">🏢 Mes agences</button>
  </div>

  <!-- GLOBAL -->
  <section id="viewGlobal">
    <div class="eyebrow" data-pt="biz-eyebrow">Tableau de bord consolidé</div>
    <h2 class="sec" data-pt="biz-h2">Toutes vos agences en un coup d'œil</h2>
    <div class="kpis" id="globalKpis"></div>
    <div class="panel">
      <h3 style="font-family:'Space Grotesk';margin-bottom:14px" data-pt="biz-detail">Détail par agence</h3>
      <div style="overflow-x:auto"><table id="globalTable"></table></div>
    </div>
  </section>

  <!-- AGENCIES -->
  <section id="viewAgencies" class="hidden">
    <div style="display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:12px;margin-bottom:20px">
      <div><div class="eyebrow" data-pt="biz-gestion">Gestion</div><h2 class="sec" style="margin:0" data-pt="biz-agencies">Mes agences</h2></div>
      <button class="btn btn-primary" onclick="addAgency()" data-pt="biz-new">➕ Nouvelle agence</button>
    </div>
    <div class="ag-grid" id="agGrid"></div>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/panel-lang.js?v=11"></script>
<script>
'use strict';
const SB = supabase.createClient(SUPA.url, SUPA.anonKey);
let USER = null;
const DB = {};                       // key -> value (parsed)

const fmtN = n => (Math.round(+n||0)).toLocaleString('fr-FR');
const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const agData = (id,key) => { const v = DB['md_AG_'+id+'__'+key]; return Array.isArray(v)?v:[]; };

function agencies(){ const a = DB['md_agencies']; return Array.isArray(a)?a:[]; }

const VCOUNT = {};   // 'md_AG_<id>__md_vehicles' -> nb de véhicules (compté côté serveur)
function agStats(id){
  const res = agData(id,'md_reservations');
  const clients = new Set();
  let revenue = 0;
  for(const r of res){ clients.add(r.phone || r.name); if(r.status==='completed') revenue += +r.total||0; }
  return { cars: VCOUNT['md_AG_'+id+'__md_vehicles']||0, reservations: res.length, clients: clients.size, revenue };
}

/* ---- cloud ----
   Only fetch what the overview aggregates: the agencies list + each agency's
   reservations & vehicles. Avoids downloading settings/templates/clients/etc.
   for every agency, which made this panel heavy as data grew. */
function _parse(v){ if(typeof v==='string'){ try{ return JSON.parse(v); }catch{} } return v; }
async function pullAll(){
  for(const k in DB) delete DB[k];
  for(const k in VCOUNT) delete VCOUNT[k];
  const { data: aRow } = await SB.from('kv_store').select('value').eq('key','md_agencies').maybeSingle();
  const list = aRow && Array.isArray(_parse(aRow.value)) ? _parse(aRow.value) : [];
  DB['md_agencies'] = list;
  if(!list.length) return;
  // Only the tiny reservations blobs + server-side vehicle counts.
  // Never the multi-MB md_vehicles (car photos) — that made this panel hang.
  const resKeys = list.map(a => 'md_AG_'+a.id+'__md_reservations');
  const [res, vc] = await Promise.all([
    SB.from('kv_store').select('key,value').in('key', resKeys),
    SB.rpc('agency_vehicle_counts')
  ]);
  if(res.error) console.warn(res.error.message);
  else for(const row of res.data) DB[row.key] = _parse(row.value);
  if(vc.error) console.warn(vc.error.message);
  else for(const row of vc.data) VCOUNT[row.key] = row.n;
}
async function saveAgencies(list){
  DB['md_agencies'] = list;
  const { error } = await SB.from('kv_store').upsert(
    [{ user_id: USER.id, key:'md_agencies', value:list, updated_at:new Date().toISOString() }],
    { onConflict:'user_id,key' });
  if(error) alert('Erreur de sauvegarde: '+error.message);
}

/* ---- actions ---- */
function addAgency(){
  const name = (prompt('Nom de la nouvelle agence :','')||'').trim();
  if(!name) return;
  const id = 'a' + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
  const list = agencies().concat([{ id, name, created:new Date().toISOString() }]);
  saveAgencies(list).then(()=>{ render(); openAgency(id); });
}
function renameAgency(id){
  const list = agencies(); const a = list.find(x=>x.id===id); if(!a) return;
  const name = (prompt('Renommer l\'agence :', a.name)||'').trim(); if(!name) return;
  a.name = name; saveAgencies(list).then(render);
}
async function deleteAgency(id){
  const a = agencies().find(x=>x.id===id);
  if(!confirm('Supprimer l\'agence "'+(a?a.name:'')+'" et TOUTES ses données ? Cette action est irréversible.')) return;
  await saveAgencies(agencies().filter(x=>x.id!==id));
  await SB.from('kv_store').delete().eq('user_id',USER.id).like('key','md_AG_'+id+'__%');  // wipe its data
  await pullAll(); render();
}
function openAgency(id){ location.href = 'app.html?agency=' + encodeURIComponent(id); }

/* ---- views ---- */
function showView(v){
  document.getElementById('viewGlobal').classList.toggle('hidden', v!=='global');
  document.getElementById('viewAgencies').classList.toggle('hidden', v!=='agencies');
  document.getElementById('tabBtnGlobal').classList.toggle('active', v==='global');
  document.getElementById('tabBtnAgencies').classList.toggle('active', v==='agencies');
}

function render(){
  const list = agencies();
  let TT={cars:0,reservations:0,clients:0,revenue:0};
  const rows = list.map(a=>{ const s=agStats(a.id); TT.cars+=s.cars;TT.reservations+=s.reservations;TT.clients+=s.clients;TT.revenue+=s.revenue; return {a,s}; });
  document.getElementById('globalKpis').innerHTML = `
    <div class="kpi"><div class="ic">🏢</div><div class="v">${list.length}</div><div class="l">${T('biz-k-ag')}</div></div>
    <div class="kpi"><div class="ic">🚙</div><div class="v">${TT.cars}</div><div class="l">${T('biz-k-veh')}</div></div>
    <div class="kpi"><div class="ic">📋</div><div class="v">${TT.reservations}</div><div class="l">${T('biz-k-res')}</div></div>
    <div class="kpi"><div class="ic">👥</div><div class="v">${TT.clients}</div><div class="l">${T('biz-k-cl')}</div></div>
    <div class="kpi"><div class="ic">💰</div><div class="v">${fmtN(TT.revenue)}</div><div class="l">${T('biz-k-ca')}</div></div>`;
  const tbl = document.getElementById('globalTable');
  tbl.innerHTML = `<thead><tr><th>${T('biz-th-ag')}</th><th class="num">${T('biz-th-veh')}</th><th class="num">${T('biz-th-res')}</th><th class="num">${T('biz-th-cl')}</th><th class="num">${T('biz-th-ca')}</th><th></th></tr></thead><tbody>` +
    (rows.length ? rows.map(({a,s})=>`<tr>
        <td><b>${esc(a.name)}</b></td>
        <td class="num">${s.cars}</td><td class="num">${s.reservations}</td><td class="num">${s.clients}</td>
        <td class="num" style="color:var(--green)">${fmtN(s.revenue)}</td>
        <td class="num"><button class="btn btn-ghost btn-sm" onclick="openAgency('${a.id}')">${T('biz-open')}</button></td>
      </tr>`).join('') : `<tr><td colspan="6" class="empty">${T('biz-empty')}</td></tr>`) +
    `</tbody>`;
  document.getElementById('agGrid').innerHTML = rows.map(({a,s})=>`
    <div class="ag-card">
      <h3>${esc(a.name)}</h3>
      <div class="meta">${T('biz-created')} ${new Date(a.created).toLocaleDateString('fr-FR')}</div>
      <div class="ag-mini">
        <div><b>${s.cars}</b>${T('biz-veh')}</div>
        <div><b>${s.reservations}</b>${T('biz-res-s')}</div>
        <div><b style="color:var(--green);font-size:1rem">${fmtN(s.revenue)}</b>${T('biz-ca-s')}</div>
      </div>
      <div class="ag-actions">
        <button class="btn btn-primary btn-sm" style="flex:1" onclick="openAgency('${a.id}')">${T('biz-opensys')}</button>
        <button class="ic-btn" title="Renommer" onclick="renameAgency('${a.id}')">✏️</button>
        <button class="ic-btn" title="Supprimer" onclick="deleteAgency('${a.id}')">🗑️</button>
      </div>
    </div>`).join('') +
    `<button class="ag-card add-card" onclick="addAgency()"><span class="plus">＋</span>${T('biz-newcard')}</button>`;
}

function setBizLang(c){ if(typeof applyPanelLang==='function') applyPanelLang(c); render(); }

async function logout(){ await SB.auth.signOut(); location.replace('index.html'); }

/* ---- boot ---- */
(async function(){
  const { data } = await SB.auth.getSession();
  if(!data.session){ location.replace('index.html'); return; }
  USER = data.session.user;
  const plan = (USER.user_metadata && USER.user_metadata.plan) || '';
  if(plan !== 'Business'){ location.replace('app.html'); return; }   // panel réservé au plan Business
  document.getElementById('who').textContent = USER.email || '';
  await pullAll();
  render();
  document.getElementById('loader').style.display='none';
  document.getElementById('main').style.display='block';
})();
</script>
</body>
</html>
